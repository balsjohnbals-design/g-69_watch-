<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G69 Monitor</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; margin: 0; }
        .btn { background: #007bff; color: white; border: none; padding: 16px 30px; font-size: 16px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 90%; max-width: 340px; margin: 10px auto; display: block; }
        .btn-green { background: #28a745; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 16px; }
        .card-full { grid-column: span 2; }
        .label { font-size: 13px; color: #888; text-transform: uppercase; }
        .val { font-size: 32px; font-weight: bold; color: #00ffcc; margin-top: 8px; }
        .unit { font-size: 15px; color: #666; }
        .log { margin-top: 15px; background: #111; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 11px; color: #0f0; text-align: left; max-height: 160px; overflow-y: auto; }
    </style>
</head>
<body>

    <h2>G69 Monitor</h2>

    <button class="btn" id="connectBtn">CONNECT WATCH</button>
    <button class="btn btn-green" id="exportBtn" style="display:none;">EXPORT FOR APPLE HEALTH</button>

    <div class="grid">
        <div class="card">
            <div class="label">Skin Temp</div>
            <div id="temp" class="val">--<span class="unit">°C</span></div>
        </div>
        <div class="card">
            <div class="label">HRV</div>
            <div id="hrv" class="val">--<span class="unit">ms</span></div>
        </div>
        <div class="card card-full">
            <div class="label">Tracker Charge</div>
            <div id="battery" class="val" style="color:#ffcc00;">--<span class="unit">%</span></div>
        </div>
    </div>

    <div id="log" class="log">Ready to connect...</div>

<script>
    const logDiv = document.getElementById('log');
    let keepAliveInterval = null;
    let metrics = { temp: null, hrv: null };

    function log(msg) {
        logDiv.innerHTML += '<br>> ' + msg;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    const delay = ms => new Promise(res => setTimeout(res, ms));

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            log('Scanning for watch...');
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true
            });

            log('Connecting to: ' + device.name);
            const server = await device.gatt.connect();

            log('Connected! Ready to parse packets.');

            // Wait for hardware to settle
            await delay(1000);

            // Get all services and find the one with a notify characteristic
            const services = await server.getPrimaryServices();
            log('Found ' + services.length + ' services');

            let notifyChar = null;
            let writeChar = null;

            for (const service of services) {
                try {
                    const chars = await service.getCharacteristics();
                    for (const c of chars) {
                        if (c.properties.notify && !notifyChar) {
                            notifyChar = c;
                            log('Notify char: ' + c.uuid);
                        }
                        if ((c.properties.write || c.properties.writeWithoutResponse) && !writeChar) {
                            writeChar = c;
                            log('Write char: ' + c.uuid);
                        }
                    }
                } catch(e) {}
            }

            if (!notifyChar) {
                log('No notify characteristic found.');
                return;
            }

            await notifyChar.startNotifications();
            log('Notifications started.');

            notifyChar.addEventListener('characteristicvaluechanged', (event) => {
                try {
                    const data = event.target.value;
                    if (!data || data.byteLength < 3) return;

                    // Same parsing as the original working version
                    const rawTemp = data.getUint16(0, true) / 10;
                    const rawHrv  = data.getUint8(2);

                    if (rawTemp > 30 && rawTemp < 45) {
                        metrics.temp = rawTemp.toFixed(1);
                        document.getElementById('temp').innerHTML = metrics.temp + '<span class="unit">°C</span>';
                    }
                    if (rawHrv > 5 && rawHrv < 250) {
                        metrics.hrv = rawHrv;
                        document.getElementById('hrv').innerHTML = metrics.hrv + '<span class="unit">ms</span>';
                    }

                    document.getElementById('exportBtn').style.display = 'block';
                } catch(e) {}
            });

            // Send trigger commands if we have a write channel
            if (writeChar) {
                const triggers = [
                    new Uint8Array([0xAB, 0x0A, 0x00, 0x00, 0x00, 0x00]),
                    new Uint8Array([0xAB, 0x00, 0x04, 0xFF, 0x31, 0x80, 0x01]),
                    new Uint8Array([0x01]),
                ];
                for (const cmd of triggers) {
                    try { await writeChar.writeValue(cmd); await delay(200); } catch(e) {}
                }

                keepAliveInterval = setInterval(async () => {
                    try { await writeChar.writeValue(new Uint8Array([0xAB, 0x0A, 0x00, 0x00, 0x00, 0x00])); } catch(e) {}
                }, 1000);
            }

            // Try battery
            try {
                const batSvc = await server.getPrimaryService(0x180f);
                const batChr = await batSvc.getCharacteristic(0x2a19);
                const batVal = await batChr.readValue();
                document.getElementById('battery').innerHTML = batVal.getUint8(0) + '<span class="unit">%</span>';
            } catch(e) { log('Battery not available.'); }

        } catch(e) {
            log('Error: ' + (e.message || 'Connection failed.'));
            if (keepAliveInterval) clearInterval(keepAliveInterval);
        }
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
        const timestamp = new Date().toISOString();
        const csv = 'Timestamp,Temp(C),HRV(ms)\n' + timestamp + ',' + (metrics.temp || '') + ',' + (metrics.hrv || '');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'G69_health_export.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        log('Exported!');
    });
</script>
</body>
</html>
