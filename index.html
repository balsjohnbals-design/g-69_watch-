<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G69 Matrix Core v3</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b0f19; color: #fff; text-align: center; padding: 15px; margin: 0; }
        .btn { background: #007bff; color: white; border: none; padding: 16px 30px; font-size: 16px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 90%; max-width: 340px; margin: 10px auto; display: block; box-shadow: 0 4px 15px rgba(0,123,255,0.4); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; padding: 5px; }
        .card { background: #161c2e; padding: 15px; border-radius: 18px; border: 1px solid #232d4b; }
        .card-full { grid-column: span 2; }
        .label { font-size: 13px; color: #8e9bb8; text-transform: uppercase; letter-spacing: 0.5px; }
        .val { font-size: 26px; font-weight: bold; color: #00ffcc; margin-top: 6px; }
        .unit { font-size: 14px; color: #6b7c96; margin-left: 2px; }
        .log { margin-top: 15px; background: #05070f; padding: 12px; border-radius: 12px; font-family: monospace; font-size: 11px; color: #39ff14; text-align: left; max-height: 220px; overflow-y: auto; border: 1px solid #111a2e; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 5px; color: #f0f4f8;">G69 Deep Scan</h2>
    <p style="color:#6b7c96; font-size:12px; margin:0 0 15px 0;">Service Discovery Profile</p>
    
    <button class="btn" id="connect">ESTABLISH LIVE STREAM</button>

    <div class="grid">
        <div class="card">
            <div class="label">Skin Temp</div>
            <div id="temp" class="val">--<span class="unit">°C</span></div>
        </div>
        <div class="card">
            <div class="label">HRV</div>
            <div id="hrv" class="val">--<span class="unit">ms</span></div>
        </div>
        <div class="card">
            <div class="label">Heart Rate</div>
            <div id="hr" class="val">--<span class="unit">bpm</span></div>
        </div>
        <div class="card">
            <div class="label">Blood Oxygen</div>
            <div id="spo2" class="val">--<span class="unit">%</span></div>
        </div>
        <div class="card card-full">
            <div class="label">Tracker Charge</div>
            <div id="battery" class="val" style="color: #ffcc00;">--<span class="unit">%</span></div>
        </div>
    </div>

    <div id="log" class="log">Ready for Deep Scan v3...</div>

<script>
    const logDiv = document.getElementById('log');
    function log(msg) { logDiv.innerHTML += '<br>> ' + msg; logDiv.scrollTop = logDiv.scrollHeight; }
    const delay = ms => new Promise(res => setTimeout(res, ms));

    document.getElementById('connect').addEventListener('click', async () => {
        try {
            log("Scanning all nearby services...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000fff0-0000-1000-8000-00805f9b34fb',
                    '0000fee7-0000-1000-8000-00805f9b34fb', 
                    '0000180d', '0000180f'
                ]
            });
            
            log("Connecting to GATT...");
            const server = await device.gatt.connect();
            
            log("Link active. Waiting 2s for hardware spin-up...");
            await delay(2000);

            log("Mapping primary services...");
            const services = await server.getPrimaryServices();
            
            if(services.length === 0) {
                log("No services exposed. Device might be locked by another app.");
                return;
            }

            for (let svc of services) {
                let shortSvc = svc.uuid.substring(4,8).toUpperCase();
                log(`[Service] Found ID: 0x${shortSvc}`);
                
                try {
                    let characteristics = await svc.getCharacteristics();
                    for (let ch of characteristics) {
                        let shortCh = ch.uuid.substring(4,8).toUpperCase();
                        let props = [];
                        if(ch.properties.read) props.push("R");
                        if(ch.properties.write) props.push("W");
                        if(ch.properties.notify) props.push("N");
                        log(`  └─ [Char] 0x${shortCh} [${props.join('/')}]`);
                    }
                } catch(cErr) {
                    log(`  └─ Could not index characteristics`);
                }
            }
            
            log("--- Scan Complete ---");
            
        } catch(e) {
            log("CRITICAL ERROR: " + (e.message || "Unknown GATT breakdown"));
        }
    });
</script>
</body>
</html>
